name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python tests/test_molt.py
      - name: Evals (labeled fixtures, must be 100%)
        run: python evals/run_evals.py
      - name: CLI smoke test
        run: |
          pip install -e .
          molt --version
          molt scan evals/fixtures/CLAUDE.md
          molt audit evals/fixtures/CLAUDE.md --transcripts evals/fixtures/transcripts
