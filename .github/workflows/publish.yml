name: publish

# Publishes molt-audit to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
# One-time setup on PyPI: add a trusted publisher for this repo with
# workflow "publish.yml" and environment "pypi". See docs/RELEASING.md.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import molt; print(molt.__version__)")
          if [ "$TAG" != "$PKG" ]; then
            echo "release tag ($TAG) != molt.__version__ ($PKG)" >&2
            exit 1
          fi
      - name: Run tests before publishing
        run: |
          for f in tests/test_*.py; do python "$f"; done
          python evals/run_evals.py
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
